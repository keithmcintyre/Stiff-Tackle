services:
  - type: web
    name: stiff-tackle
    env: node
    region: oregon
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    # Persistent disk — required to keep match data between deploys.
    # Render Starter plan ($7/mo) + Disk ($0.25/GB/mo).
    disk:
      name: stiff-tackle-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
